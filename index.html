<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YPD | YouTube to MP3 (GitHub Pages)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #f5f5f5;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .glass-card {
            background: rgba(20,20,20,0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 32rem;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px black;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .accent-red { color: #cc0000; }
        .sub { opacity: 0.6; margin-bottom: 2rem; }
        input {
            width: 100%;
            background: #121212;
            border: none;
            border-bottom: 2px solid #333;
            color: white;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            border-radius: 0.5rem;
            outline: none;
            transition: all 0.3s;
        }
        input:focus {
            border-bottom-color: #cc0000;
            box-shadow: 0 10px 15px -10px rgba(204,0,0,0.3);
        }
        button {
            cursor: pointer;
            border: none;
            padding: 1rem 2rem;
            font-weight: bold;
            border-radius: 9999px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1.5rem;
            width: 100%;
        }
        .btn-primary {
            background: #cc0000;
            color: white;
            box-shadow: 0 10px 25px rgba(204,0,0,0.3);
        }
        .btn-primary:hover {
            background: #e60000;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #8a0000, #cc0000);
            color: white;
        }
        .metadata-card {
            background: #121212;
            border: 1px solid #333;
            padding: 1.5rem;
            border-radius: 1.5rem;
            margin: 1.5rem 0;
        }
        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background-size: cover;
            background-position: center;
            border-radius: 1rem;
            margin-bottom: 1rem;
        }
        .playlist-icon {
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, #1a0000, #330000);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .playlist-icon svg { width: 3rem; height: 3rem; fill: #cc0000; }
        .video-title { font-size: 1.25rem; font-weight: 800; text-align: center; }
        .status { margin-top: 1rem; font-size: 0.875rem; opacity: 0.7; font-style: italic; }
        .hidden { display: none; }
        .progress-bar-wrap {
            background: #333;
            border-radius: 9999px;
            height: 6px;
            margin-top: 1rem;
            overflow: hidden;
        }
        .progress-bar {
            background: #cc0000;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
<div class="glass-card">
    <h1>YDP <span class="accent-red">by blood09</span></h1>
    <div class="sub">YouTube → MP3 (powered by your backend)</div>

    <div id="input-section">
        <input type="text" id="url-input" placeholder="Paste YouTube Video or Playlist URL...">
        <button id="extract-btn" class="btn-primary">Extract Info</button>
    </div>

    <div id="result-section" class="hidden">
        <div class="metadata-card">
            <div id="thumbnail-div" class="thumbnail hidden"></div>
            <div id="playlist-div" class="playlist-icon hidden">
                <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h12v2H3v-2zm14 1l5-3-5-3v6z"/></svg>
                <span id="playlist-count"></span>
            </div>
            <div id="video-title" class="video-title"></div>
        </div>
        <button id="download-btn" class="btn-secondary">Download MP3 / ZIP</button>
        <div class="progress-bar-wrap hidden" id="progress-wrap">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>
    <div id="status" class="status">Ready</div>
</div>

<script>
    // === CHANGE THIS TO YOUR BACKEND URL ===
    const BACKEND_URL = 'https://ypd-test.onrender.com'; // e.g. https://ypd-backend.onrender.com

    let currentUrl = '';
    let isPlaylist = false;
    let playlistCount = 0;
    let videoTitle = '';

    const urlInput = document.getElementById('url-input');
    const extractBtn = document.getElementById('extract-btn');
    const resultSection = document.getElementById('result-section');
    const thumbnailDiv = document.getElementById('thumbnail-div');
    const playlistDiv = document.getElementById('playlist-div');
    const playlistCountSpan = document.getElementById('playlist-count');
    const videoTitleSpan = document.getElementById('video-title');
    const downloadBtn = document.getElementById('download-btn');
    const statusDiv = document.getElementById('status');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar = document.getElementById('progress-bar');

    extractBtn.addEventListener('click', async () => {
        const url = urlInput.value.trim();
        if (!url) return;
        currentUrl = url;
        statusDiv.innerText = 'Fetching info...';
        extractBtn.disabled = true;

        try {
            const res = await fetch(`${BACKEND_URL}/info`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            isPlaylist = data.is_playlist;
            videoTitle = data.title;
            videoTitleSpan.innerText = videoTitle;

            if (isPlaylist) {
                playlistCount = data.count;
                thumbnailDiv.classList.add('hidden');
                playlistDiv.classList.remove('hidden');
                playlistCountSpan.innerText = `${playlistCount} track${playlistCount !== 1 ? 's' : ''}`;
                downloadBtn.innerText = 'Download All as ZIP';
            } else {
                playlistDiv.classList.add('hidden');
                thumbnailDiv.classList.remove('hidden');
                thumbnailDiv.style.backgroundImage = `url('${data.thumbnail}')`;
                downloadBtn.innerText = 'Download MP3';
            }

            resultSection.classList.remove('hidden');
            document.getElementById('input-section').classList.add('hidden');
            statusDiv.innerText = isPlaylist ? `Playlist ready: ${playlistCount} tracks.` : 'Ready to convert.';
        } catch (err) {
            statusDiv.innerText = `Error: ${err.message}`;
        } finally {
            extractBtn.disabled = false;
        }
    });

    downloadBtn.addEventListener('click', async () => {
        statusDiv.innerText = isPlaylist ? 'Zipping playlist... may take a while.' : 'Downloading MP3...';
        downloadBtn.disabled = true;
        progressWrap.classList.remove('hidden');
        progressBar.style.width = '0%';

        let fakeProgress = 0;
        const interval = setInterval(() => {
            if (fakeProgress < 85) {
                fakeProgress += Math.random() * 5;
                progressBar.style.width = Math.min(fakeProgress, 85) + '%';
            }
        }, 500);

        try {
            const res = await fetch(`${BACKEND_URL}/download`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: currentUrl })
            });

            clearInterval(interval);
            progressBar.style.width = '100%';

            if (!res.ok) {
                const errData = await res.json();
                throw new Error(errData.error || 'Download failed');
            }

            const blob = await res.blob();
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = videoTitle + (isPlaylist ? '.zip' : '.mp3');
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(downloadUrl);
            statusDiv.innerText = 'Download complete!';
        } catch (err) {
            statusDiv.innerText = `Error: ${err.message}`;
        } finally {
            downloadBtn.disabled = false;
            setTimeout(() => {
                progressWrap.classList.add('hidden');
                progressBar.style.width = '0%';
            }, 2000);
        }
    });
</script>
</body>
</html>
