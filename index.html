<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>YPD – YouTube Playlist to MP3 Zip</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 1.5rem;
            padding: 1.5rem;
            max-width: 32rem;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #f97316, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
            text-align: center;
            letter-spacing: -0.5px;
        }
        .badge {
            text-align: center;
            font-size: 0.7rem;
            color: #f97316;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        .sub {
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
        }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            color: #f8fafc;
            font-size: 0.875rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2);
        }
        button {
            width: 100%;
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: #f97316;
            border: none;
            border-radius: 0.75rem;
            color: white;
            font-weight: 700;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) {
            background: #ea580c;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #cancelBtn {
            background: #475569;
        }
        #cancelBtn:hover:not(:disabled) {
            background: #334155;
        }
        .progress-area {
            margin-top: 1rem;
            display: none;
        }
        .progress-bar-wrap {
            background: #334155;
            border-radius: 9999px;
            height: 0.5rem;
            overflow: hidden;
            margin-bottom: 0.75rem;
        }
        .progress-bar {
            background: linear-gradient(to right, #f97316, #ef4444);
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
        }
        .status {
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .log {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 0.75rem;
            padding: 0.75rem;
            height: 12rem;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            color: #cbd5e1;
        }
        .log div {
            border-left: 2px solid #f97316;
            padding-left: 0.5rem;
            margin-bottom: 0.25rem;
        }
        .log .error {
            border-left-color: #ef4444;
            color: #fca5a5;
        }
        .footer {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #64748b;
            text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
<div class="card">
    <h1>YPD</h1>
    <div class="badge">YouTube Playlist Downloader</div>
    <div class="sub">MP3 · ZIP · No API key · No cookies · Uses your Vercel proxy</div>

    <input type="text" id="playlistUrl" placeholder="Paste YouTube playlist URL (must contain ?list=...)" />
    <button id="downloadBtn">🚀 Fetch & Download ZIP</button>
    <button id="cancelBtn" disabled>⛔ Cancel</button>

    <div id="progressArea" class="progress-area">
        <div class="progress-bar-wrap"><div id="progressFill" class="progress-bar"></div></div>
        <div id="statusMsg" class="status">Preparing...</div>
        <div id="log" class="log"></div>
    </div>
    <div class="footer">RSS via proxy | Cobalt via your Vercel proxy → works from GitHub Pages</div>
</div>

<script>
    // ---------- Configuration ----------
    const RSS_PROXY = "https://corsproxy.io/?";
    // Your Vercel proxy endpoint (must be deployed with api/cobalt.js)
    const COBALT_PROXY = "https://project-r315y.vercel.app/api/cobalt";

    let isCancelled = false;

    function addLog(msg, isError = false) {
        const logDiv = document.getElementById('log');
        const line = document.createElement('div');
        line.className = isError ? 'error' : '';
        line.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.appendChild(line);
        logDiv.scrollTop = logDiv.scrollHeight;
        while (logDiv.children.length > 100) logDiv.removeChild(logDiv.firstChild);
    }

    function updateProgress(percent, status) {
        document.getElementById('progressFill').style.width = `${Math.min(100, Math.max(0, percent))}%`;
        if (status) document.getElementById('statusMsg').innerText = status;
    }

    function extractPlaylistId(url) {
        const match = url.match(/[&?]list=([^&]+)/);
        return match ? match[1] : null;
    }

    // Fetch playlist via YouTube RSS feed (using proxy for CORS)
    async function fetchPlaylistFromRSS(playlistId) {
        const rssUrl = `https://www.youtube.com/feeds/videos.xml?playlist_id=${playlistId}`;
        const proxyUrl = RSS_PROXY + encodeURIComponent(rssUrl);
        addLog("Fetching RSS feed from YouTube...");
        const resp = await fetch(proxyUrl);
        if (!resp.ok) throw new Error(`RSS fetch failed: ${resp.status}`);
        const text = await resp.text();
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(text, "text/xml");
        const entries = xmlDoc.querySelectorAll("entry");
        if (entries.length === 0) throw new Error("No videos found (playlist may be empty or private)");
        const videos = [];
        for (let entry of entries) {
            const titleElem = entry.querySelector("title");
            let title = titleElem ? titleElem.textContent : "Unknown";
            let videoId = null;
            const videoIdElem = entry.querySelector("yt\\:videoId, videoId");
            if (videoIdElem) videoId = videoIdElem.textContent;
            if (!videoId) {
                const link = entry.querySelector("link[rel='alternate']");
                if (link) {
                    const href = link.getAttribute("href");
                    const match = href.match(/v=([^&]+)/);
                    if (match) videoId = match[1];
                }
            }
            if (videoId) {
                videos.push({ id: videoId, title: title });
            }
        }
        addLog(`✅ RSS feed returned ${videos.length} videos`);
        return videos;
    }

    // Convert video using your Vercel proxy (calls Cobalt API server-side)
    async function convertVideoToMp3(videoId, title) {
        const payload = {
            url: `https://www.youtube.com/watch?v=${videoId}`,
            aFormat: "mp3",
            isAudioOnly: true,
            isNoTTL: false,
            filenamePattern: "classic"
        };
        const resp = await fetch(COBALT_PROXY, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        if (!resp.ok) {
            const errorText = await resp.text();
            throw new Error(`Proxy error ${resp.status}: ${errorText.slice(0, 100)}`);
        }
        const data = await resp.json();
        if (data.status === "error") throw new Error(data.text);
        if (!data.url) throw new Error("No download URL from Cobalt");
        // Download the MP3 file (the URL is CORS-friendly)
        const audioResp = await fetch(data.url);
        if (!audioResp.ok) throw new Error("Failed to download MP3");
        const blob = await audioResp.blob();
        let safeTitle = title.replace(/[^\w\s.-]/g, "").slice(0, 60);
        if (!safeTitle) safeTitle = videoId;
        return { blob, filename: `${safeTitle}.mp3` };
    }

    async function startDownload() {
        const url = document.getElementById('playlistUrl').value.trim();
        const playlistId = extractPlaylistId(url);
        if (!playlistId) {
            alert("Invalid playlist URL – must contain ?list=...");
            return;
        }

        isCancelled = false;
        const downloadBtn = document.getElementById('downloadBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        downloadBtn.disabled = true;
        cancelBtn.disabled = false;
        cancelBtn.classList.remove('cursor-not-allowed', 'bg-gray-600');
        cancelBtn.classList.add('bg-red-600', 'hover:bg-red-700', 'cursor-pointer');
        document.getElementById('progressArea').style.display = 'block';
        document.getElementById('log').innerHTML = '';
        updateProgress(0, "Fetching playlist...");

        try {
            addLog(`Playlist ID: ${playlistId}`);
            const videos = await fetchPlaylistFromRSS(playlistId);
            addLog(`✅ Found ${videos.length} videos. Starting MP3 conversion...`);

            const zip = new JSZip();
            let completed = 0;
            const total = videos.length;
            const queue = [...videos];
            const concurrency = 3;
            const errors = [];

            async function worker() {
                while (queue.length > 0 && !isCancelled) {
                    const video = queue.shift();
                    if (!video) break;
                    try {
                        addLog(`🎧 Converting: ${video.title.substring(0, 50)}...`);
                        const { blob, filename } = await convertVideoToMp3(video.id, video.title);
                        zip.file(filename, blob);
                        completed++;
                        const percent = (completed / total) * 100;
                        updateProgress(percent, `Converted ${completed}/${total}`);
                        addLog(`✅ Added: ${filename}`);
                    } catch (err) {
                        errors.push({ title: video.title, error: err.message });
                        addLog(`❌ Failed: ${video.title.substring(0, 50)} - ${err.message}`, true);
                        completed++;
                        const percent = (completed / total) * 100;
                        updateProgress(percent, `Failed on ${video.title.substring(0, 30)}`);
                    }
                }
            }

            const workers = [];
            for (let i = 0; i < concurrency; i++) workers.push(worker());
            await Promise.all(workers);

            if (isCancelled) throw new Error("Cancelled by user");

            updateProgress(99, "Creating ZIP...");
            const zipBlob = await zip.generateAsync({ type: "blob" });
            saveAs(zipBlob, `YPD_${playlistId}.zip`);
            addLog(`🎉 Success! ZIP saved with ${zip.file(/\.mp3$/).length} MP3 files. ${errors.length} errors.`);
            updateProgress(100, "Complete!");
        } catch (err) {
            if (err.message !== "Cancelled by user") {
                addLog(`💥 Fatal error: ${err.message}`, true);
                updateProgress(0, "Error");
            } else {
                addLog("⛔ Cancelled.", true);
            }
        } finally {
            downloadBtn.disabled = false;
            cancelBtn.disabled = true;
            cancelBtn.classList.remove('bg-red-600', 'hover:bg-red-700', 'cursor-pointer');
            cancelBtn.classList.add('bg-gray-600', 'cursor-not-allowed');
            isCancelled = false;
        }
    }

    function cancelProcess() {
        isCancelled = true;
    }

    document.getElementById('downloadBtn').onclick = startDownload;
    document.getElementById('cancelBtn').onclick = cancelProcess;
</script>
</body>
</html>
