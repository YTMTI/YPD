<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YPD – YouTube Playlist to MP3</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 1.5rem;
            padding: 1.5rem;
            max-width: 32rem;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #f97316, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
            text-align: center;
        }
        .sub {
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
        }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            color: #f8fafc;
            font-size: 0.875rem;
            outline: none;
        }
        input:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2);
        }
        button {
            width: 100%;
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: #f97316;
            border: none;
            border-radius: 0.75rem;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) {
            background: #ea580c;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #cancelBtn {
            background: #475569;
        }
        .progress-area {
            margin-top: 1rem;
            display: none;
        }
        .progress-bar-wrap {
            background: #334155;
            border-radius: 9999px;
            height: 0.5rem;
            overflow: hidden;
            margin-bottom: 0.75rem;
        }
        .progress-bar {
            background: linear-gradient(to right, #f97316, #ef4444);
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
        }
        .status {
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .log {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 0.75rem;
            padding: 0.75rem;
            height: 12rem;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.7rem;
            color: #cbd5e1;
        }
        .log div {
            border-left: 2px solid #f97316;
            padding-left: 0.5rem;
            margin-bottom: 0.25rem;
        }
        .log .error {
            border-left-color: #ef4444;
            color: #fca5a5;
        }
        .footer {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #64748b;
            text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
<div class="card">
    <h1>YPD</h1>
    <div class="sub">YouTube Playlist → MP3 Zip</div>

    <input type="text" id="playlistUrl" placeholder="Paste YouTube playlist URL (must contain ?list=...)" />
    <button id="downloadBtn">🚀 Fetch & Download ZIP</button>
    <button id="cancelBtn" disabled>⛔ Cancel</button>

    <div id="progressArea" class="progress-area">
        <div class="progress-bar-wrap"><div id="progressFill" class="progress-bar"></div></div>
        <div id="statusMsg" class="status">Preparing...</div>
        <div id="log" class="log"></div>
    </div>
    <div class="footer">Backend hosted on Render. No API keys, no cookies.</div>
</div>

<script>
    const BACKEND_URL = "http://localhost:5000";

    let isCancelled = false;
    let currentAbort = null;

    function addLog(msg, isError = false) {
        const logDiv = document.getElementById('log');
        const line = document.createElement('div');
        line.className = isError ? 'error' : '';
        line.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.appendChild(line);
        logDiv.scrollTop = logDiv.scrollHeight;
        while (logDiv.children.length > 100) logDiv.removeChild(logDiv.firstChild);
    }

    function updateProgress(percent, status) {
        document.getElementById('progressFill').style.width = `${Math.min(100, Math.max(0, percent))}%`;
        if (status) document.getElementById('statusMsg').innerText = status;
    }

    function extractPlaylistId(url) {
        const match = url.match(/[&?]list=([^&]+)/);
        return match ? match[1] : null;
    }

    async function startDownload() {
        const url = document.getElementById('playlistUrl').value.trim();
        const playlistId = extractPlaylistId(url);
        if (!playlistId) {
            alert("Invalid playlist URL – must contain ?list=...");
            return;
        }

        isCancelled = false;
        const downloadBtn = document.getElementById('downloadBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        downloadBtn.disabled = true;
        cancelBtn.disabled = false;
        cancelBtn.classList.remove('cursor-not-allowed', 'bg-gray-600');
        cancelBtn.classList.add('bg-red-600', 'hover:bg-red-700', 'cursor-pointer');
        document.getElementById('progressArea').style.display = 'block';
        document.getElementById('log').innerHTML = '';
        updateProgress(0, "Contacting backend...");

        const controller = new AbortController();
        currentAbort = controller;

        try {
            // 1. Get info
            addLog(`Playlist ID: ${playlistId}`);
            const infoRes = await fetch(`${BACKEND_URL}/info`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url }),
                signal: controller.signal
            });
            const info = await infoRes.json();
            if (info.error) throw new Error(info.error);
            addLog(`Title: ${info.title} | ${info.is_playlist ? `Playlist, ${info.count} videos` : 'Single video'}`);

            // 2. Trigger download
            updateProgress(10, "Downloading & converting... (may take a while)");
            const dlRes = await fetch(`${BACKEND_URL}/download`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url }),
                signal: controller.signal
            });
            if (!dlRes.ok) {
                const err = await dlRes.json();
                throw new Error(err.error || 'Download failed');
            }
            const blob = await dlRes.blob();
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = info.is_playlist ? `${info.title}.zip` : `${info.title}.mp3`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(downloadUrl);
            updateProgress(100, "Complete!");
            addLog("✅ Download finished!");
        } catch (err) {
            if (err.name === 'AbortError') {
                addLog("⛔ Cancelled by user", true);
            } else {
                addLog(`❌ Error: ${err.message}`, true);
                updateProgress(0, "Error");
            }
        } finally {
            downloadBtn.disabled = false;
            cancelBtn.disabled = true;
            cancelBtn.classList.remove('bg-red-600', 'hover:bg-red-700', 'cursor-pointer');
            cancelBtn.classList.add('bg-gray-600', 'cursor-not-allowed');
            currentAbort = null;
        }
    }

    function cancelProcess() {
        if (currentAbort) {
            currentAbort.abort();
            currentAbort = null;
        }
        isCancelled = true;
    }

    document.getElementById('downloadBtn').onclick = startDownload;
    document.getElementById('cancelBtn').onclick = cancelProcess;
</script>
</body>
</html>
