<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YPD – YouTube Playlist to MP3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .glass { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass rounded-2xl p-6 max-w-md w-full shadow-2xl border border-gray-700">
        <h1 class="text-3xl font-bold text-center bg-gradient-to-r from-orange-500 to-red-500 bg-clip-text text-transparent">YPD</h1>
        <p class="text-gray-300 text-center text-sm mb-6">YouTube Playlist → MP3 Zip</p>

        <div class="space-y-4">
            <input type="text" id="playlistUrl" class="w-full p-3 rounded-lg bg-slate-800 text-white border border-gray-600 focus:ring-2 focus:ring-orange-500" placeholder="Paste YouTube playlist URL">
            <button id="fetchBtn" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 rounded-lg transition">Fetch & Download ZIP</button>
            <button id="cancelBtn" disabled class="w-full bg-gray-600 text-gray-300 py-2 rounded-lg cursor-not-allowed">Cancel</button>
        </div>

        <div id="progressArea" class="mt-4 hidden">
            <div class="progress-bar-wrap bg-gray-700 rounded-full h-2 overflow-hidden">
                <div id="progressFill" class="bg-orange-500 h-2 transition-all duration-200" style="width:0%"></div>
            </div>
            <div id="statusMsg" class="text-gray-400 text-xs text-center mt-2"></div>
            <div id="log" class="bg-black/30 rounded-lg p-2 h-40 overflow-y-auto text-xs font-mono mt-3 text-gray-300"></div>
        </div>
    </div>

    <script>
        // === CHANGE THIS TO YOUR RENDER BACKEND URL ===
        const BACKEND_URL = "https://ypd-test.onrender.com";

        let currentAbort = null;

        function addLog(msg, isError = false) {
            const logDiv = document.getElementById('log');
            const line = document.createElement('div');
            line.className = `border-l-2 pl-2 mb-1 ${isError ? 'border-red-500 text-red-300' : 'border-orange-500 text-gray-300'}`;
            line.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
            if (logDiv.children.length > 100) logDiv.removeChild(logDiv.firstChild);
        }

        function updateProgress(percent, status) {
            document.getElementById('progressFill').style.width = `${Math.min(100, Math.max(0, percent))}%`;
            if (status) document.getElementById('statusMsg').innerText = status;
        }

        async function startDownload() {
            const url = document.getElementById('playlistUrl').value.trim();
            if (!url) return alert("Please enter a playlist URL");

            const fetchBtn = document.getElementById('fetchBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            fetchBtn.disabled = true;
            cancelBtn.disabled = false;
            cancelBtn.classList.remove('cursor-not-allowed', 'bg-gray-600');
            cancelBtn.classList.add('bg-red-600', 'hover:bg-red-700', 'cursor-pointer');
            document.getElementById('progressArea').classList.remove('hidden');
            document.getElementById('log').innerHTML = '';
            updateProgress(0, "Contacting backend...");

            const controller = new AbortController();
            currentAbort = controller;

            try {
                // First, get info (optional, but good for feedback)
                addLog("Fetching playlist info...");
                const infoRes = await fetch(`${BACKEND_URL}/info`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url }),
                    signal: controller.signal
                });
                const info = await infoRes.json();
                if (info.error) throw new Error(info.error);
                addLog(`Title: ${info.title} | ${info.is_playlist ? `Playlist with ${info.count} videos` : "Single video"}`);

                // Now trigger download
                updateProgress(10, "Downloading and converting... (this may take a while)");
                const dlRes = await fetch(`${BACKEND_URL}/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url }),
                    signal: controller.signal
                });
                if (!dlRes.ok) {
                    const errData = await dlRes.json();
                    throw new Error(errData.error || "Download failed");
                }
                const blob = await dlRes.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = info.is_playlist ? `${info.title}.zip` : `${info.title}.mp3`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(downloadUrl);
                updateProgress(100, "Complete!");
                addLog("✅ Download finished!");
            } catch (err) {
                if (err.name === 'AbortError') {
                    addLog("⛔ Cancelled by user", true);
                } else {
                    addLog(`❌ Error: ${err.message}`, true);
                    updateProgress(0, "Error");
                }
            } finally {
                fetchBtn.disabled = false;
                cancelBtn.disabled = true;
                cancelBtn.classList.remove('bg-red-600', 'hover:bg-red-700', 'cursor-pointer');
                cancelBtn.classList.add('bg-gray-600', 'cursor-not-allowed');
                currentAbort = null;
            }
        }

        function cancelDownload() {
            if (currentAbort) {
                currentAbort.abort();
                currentAbort = null;
            }
        }

        document.getElementById('fetchBtn').onclick = startDownload;
        document.getElementById('cancelBtn').onclick = cancelDownload;
    </script>
</body>
</html>
