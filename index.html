<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>YPD – YouTube Playlist to MP3 Zip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .glass { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass rounded-2xl p-6 max-w-md w-full shadow-2xl border border-gray-700">
        <h1 class="text-3xl font-bold text-center bg-gradient-to-r from-orange-500 to-red-500 bg-clip-text text-transparent">YPD</h1>
        <p class="text-gray-300 text-center text-sm mb-6">YouTube Playlist → MP3 Zip (RSS + Cobalt)</p>

        <div class="space-y-4">
            <input type="text" id="playlistUrl" class="w-full p-3 rounded-lg bg-slate-800 text-white border border-gray-600 focus:ring-2 focus:ring-orange-500" placeholder="Paste YouTube playlist URL">
            <button id="downloadBtn" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 rounded-lg transition">🚀 Fetch & Download ZIP</button>
            <button id="cancelBtn" disabled class="w-full bg-gray-600 text-gray-300 py-2 rounded-lg cursor-not-allowed">⛔ Cancel</button>
        </div>

        <div id="progressArea" class="mt-4 hidden">
            <div class="progress-bar-wrap bg-gray-700 rounded-full h-2 overflow-hidden">
                <div id="progressFill" class="bg-orange-500 h-2 transition-all duration-200" style="width:0%"></div>
            </div>
            <div id="statusMsg" class="text-gray-400 text-xs text-center mt-2"></div>
            <div id="log" class="bg-black/30 rounded-lg p-2 h-40 overflow-y-auto text-xs font-mono mt-3 text-gray-300"></div>
        </div>
        <div class="text-gray-500 text-xs text-center mt-4">Uses YouTube RSS feed (no block) + Cobalt API. No cookies, no backend.</div>
    </div>

    <script>
        const CORS_PROXY = "https://corsproxy.io/?";
        const COBALT_API = "https://api.cobalt.tools/api/json";

        let isCancelled = false;

        function addLog(msg, isError = false) {
            const logDiv = document.getElementById('log');
            const line = document.createElement('div');
            line.className = `border-l-2 pl-2 mb-1 ${isError ? 'border-red-500 text-red-300' : 'border-orange-500 text-gray-300'}`;
            line.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
            while (logDiv.children.length > 100) logDiv.removeChild(logDiv.firstChild);
        }

        function updateProgress(percent, status) {
            document.getElementById('progressFill').style.width = `${Math.min(100, Math.max(0, percent))}%`;
            if (status) document.getElementById('statusMsg').innerText = status;
        }

        function extractPlaylistId(url) {
            const match = url.match(/[&?]list=([^&]+)/);
            return match ? match[1] : null;
        }

        // Fetch playlist via YouTube RSS feed (never blocked, no auth)
        async function fetchPlaylistFromRSS(playlistId) {
            const rssUrl = `https://www.youtube.com/feeds/videos.xml?playlist_id=${playlistId}`;
            const proxyUrl = CORS_PROXY + encodeURIComponent(rssUrl);
            addLog("Fetching RSS feed from YouTube...");
            const resp = await fetch(proxyUrl);
            if (!resp.ok) throw new Error(`RSS fetch failed: ${resp.status}`);
            const text = await resp.text();
            // Parse XML
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(text, "text/xml");
            const entries = xmlDoc.querySelectorAll("entry");
            if (entries.length === 0) throw new Error("No videos found (playlist may be empty or private)");
            const videos = [];
            for (let entry of entries) {
                const titleElem = entry.querySelector("title");
                let title = titleElem ? titleElem.textContent : "Unknown";
                // Extract video ID from <yt:videoId> or <videoId> or link
                let videoId = null;
                const videoIdElem = entry.querySelector("yt\\:videoId, videoId");
                if (videoIdElem) videoId = videoIdElem.textContent;
                if (!videoId) {
                    const link = entry.querySelector("link[rel='alternate']");
                    if (link) {
                        const href = link.getAttribute("href");
                        const match = href.match(/v=([^&]+)/);
                        if (match) videoId = match[1];
                    }
                }
                if (videoId) {
                    videos.push({ id: videoId, title: title });
                }
            }
            addLog(`✅ RSS feed returned ${videos.length} videos`);
            return videos;
        }

        async function convertVideoToMp3(videoId, title) {
            const payload = {
                url: `https://www.youtube.com/watch?v=${videoId}`,
                aFormat: "mp3",
                isAudioOnly: true,
                isNoTTL: false,
                filenamePattern: "classic"
            };
            const proxyUrl = CORS_PROXY + encodeURIComponent(COBALT_API);
            const resp = await fetch(proxyUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            if (!resp.ok) throw new Error(`Cobalt HTTP ${resp.status}`);
            const data = await resp.json();
            if (data.status === "error") throw new Error(data.text);
            if (!data.url) throw new Error("No download URL from Cobalt");
            const audioResp = await fetch(data.url);
            if (!audioResp.ok) throw new Error("Failed to download MP3");
            const blob = await audioResp.blob();
            let safeTitle = title.replace(/[^\w\s.-]/g, "").slice(0, 60);
            if (!safeTitle) safeTitle = videoId;
            return { blob, filename: `${safeTitle}.mp3` };
        }

        async function startDownload() {
            const url = document.getElementById('playlistUrl').value.trim();
            const playlistId = extractPlaylistId(url);
            if (!playlistId) {
                alert("Invalid playlist URL – must contain ?list=...");
                return;
            }

            isCancelled = false;
            const downloadBtn = document.getElementById('downloadBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            downloadBtn.disabled = true;
            cancelBtn.disabled = false;
            cancelBtn.classList.remove('cursor-not-allowed', 'bg-gray-600');
            cancelBtn.classList.add('bg-red-600', 'hover:bg-red-700', 'cursor-pointer');
            document.getElementById('progressArea').classList.remove('hidden');
            document.getElementById('log').innerHTML = '';
            updateProgress(0, "Fetching playlist...");

            try {
                addLog(`Playlist ID: ${playlistId}`);
                const videos = await fetchPlaylistFromRSS(playlistId);
                addLog(`✅ Found ${videos.length} videos. Starting MP3 conversion...`);

                const zip = new JSZip();
                let completed = 0;
                const total = videos.length;
                const queue = [...videos];
                const concurrency = 3;
                const errors = [];

                async function worker() {
                    while (queue.length > 0 && !isCancelled) {
                        const video = queue.shift();
                        if (!video) break;
                        try {
                            addLog(`🎧 Converting: ${video.title.substring(0, 50)}...`);
                            const { blob, filename } = await convertVideoToMp3(video.id, video.title);
                            zip.file(filename, blob);
                            completed++;
                            const percent = (completed / total) * 100;
                            updateProgress(percent, `Converted ${completed}/${total}`);
                            addLog(`✅ Added: ${filename}`);
                        } catch (err) {
                            errors.push({ title: video.title, error: err.message });
                            addLog(`❌ Failed: ${video.title.substring(0, 50)} - ${err.message}`, true);
                            completed++;
                            const percent = (completed / total) * 100;
                            updateProgress(percent, `Failed on ${video.title.substring(0, 30)}`);
                        }
                    }
                }

                const workers = [];
                for (let i = 0; i < concurrency; i++) workers.push(worker());
                await Promise.all(workers);

                if (isCancelled) throw new Error("Cancelled by user");

                updateProgress(99, "Creating ZIP...");
                const zipBlob = await zip.generateAsync({ type: "blob" });
                saveAs(zipBlob, `YPD_${playlistId}.zip`);
                addLog(`🎉 Success! ZIP saved with ${zip.file(/\.mp3$/).length} MP3 files. ${errors.length} errors.`);
                updateProgress(100, "Complete!");
            } catch (err) {
                if (err.message !== "Cancelled by user") {
                    addLog(`💥 Fatal error: ${err.message}`, true);
                    updateProgress(0, "Error");
                } else {
                    addLog("⛔ Cancelled.", true);
                }
            } finally {
                downloadBtn.disabled = false;
                cancelBtn.disabled = true;
                cancelBtn.classList.remove('bg-red-600', 'hover:bg-red-700', 'cursor-pointer');
                cancelBtn.classList.add('bg-gray-600', 'cursor-not-allowed');
                isCancelled = false;
            }
        }

        function cancelProcess() {
            isCancelled = true;
        }

        document.getElementById('downloadBtn').onclick = startDownload;
        document.getElementById('cancelBtn').onclick = cancelProcess;
    </script>
</body>
</html>
