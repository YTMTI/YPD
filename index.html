<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist to MP3 Zip – No Cookies, No Backend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .glass { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen p-4 flex items-center justify-center">
    <div class="max-w-2xl w-full glass rounded-2xl p-6 shadow-2xl border border-gray-700">
        <h1 class="text-3xl font-bold text-white text-center mb-2">🎵 Playlist → MP3 Zip</h1>
        <p class="text-gray-300 text-center text-sm mb-6">No cookies, no backend – works entirely in your browser</p>

        <div class="space-y-4">
            <input type="text" id="playlistUrl" class="w-full p-3 rounded-lg bg-slate-800 text-white border border-gray-600 focus:ring-2 focus:ring-blue-500" placeholder="Paste YouTube playlist URL (must contain ?list=...)">
            
            <div class="flex gap-3">
                <button id="downloadBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition">Fetch & Download ZIP</button>
                <button id="cancelBtn" disabled class="bg-gray-600 text-gray-300 px-4 py-2 rounded-lg cursor-not-allowed">Cancel</button>
            </div>

            <div id="progressArea" class="hidden mt-4">
                <div class="flex justify-between text-sm text-gray-300">
                    <span id="statusMsg">Preparing...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-2 mt-1">
                    <div id="progressFill" class="bg-green-500 h-2 rounded-full transition-all duration-200" style="width:0%"></div>
                </div>
                <div id="log" class="bg-black/30 rounded-lg p-2 h-40 overflow-y-auto text-xs font-mono mt-3 text-gray-300"></div>
            </div>
        </div>
    </div>

    <script>
        // List of public Invidious instances that support CORS (or use a CORS proxy)
        const INVIDIOUS_INSTANCES = [
            "https://inv.riverside.rocks",
            "https://yewtu.be",
            "https://invidious.snopyta.org",
            "https://vid.puffyan.us"
        ];
        const COBALT_API = "https://api.cobalt.tools/api/json";
        // CORS proxy (free, no rate limit for small usage)
        const CORS_PROXY = "https://corsproxy.io/?";

        let currentInstanceIndex = 0;
        let isCancelled = false;

        async function fetchWithCorsProxy(url) {
            // Try direct first, then fallback to proxy if CORS error
            try {
                const res = await fetch(url);
                if (res.ok) return res;
                throw new Error("CORS or network error");
            } catch (e) {
                // Use CORS proxy
                const proxyUrl = CORS_PROXY + encodeURIComponent(url);
                const res = await fetch(proxyUrl);
                if (!res.ok) throw new Error(`Proxy fetch failed: ${res.status}`);
                return res;
            }
        }

        async function fetchFromInvidious(path) {
            for (let i = 0; i < INVIDIOUS_INSTANCES.length; i++) {
                const instance = INVIDIOUS_INSTANCES[currentInstanceIndex];
                try {
                    const url = `${instance}${path}`;
                    addLog(`Trying Invidious: ${instance}`);
                    const res = await fetchWithCorsProxy(url);
                    if (res.ok) {
                        const data = await res.json();
                        addLog(`✅ Using ${instance}`);
                        return data;
                    }
                } catch (err) {
                    addLog(`⚠️ ${instance} failed: ${err.message}`, true);
                }
                // rotate to next instance
                currentInstanceIndex = (currentInstanceIndex + 1) % INVIDIOUS_INSTANCES.length;
            }
            throw new Error("All Invidious instances failed");
        }

        function addLog(msg, isError = false) {
            const logDiv = document.getElementById('log');
            const line = document.createElement('div');
            line.className = `border-l-2 pl-2 mb-1 ${isError ? 'border-red-500 text-red-300' : 'border-green-500 text-gray-300'}`;
            line.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateProgress(percent, status) {
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressPercent').innerText = `${Math.round(percent)}%`;
            if (status) document.getElementById('statusMsg').innerText = status;
        }

        function extractPlaylistId(url) {
            const match = url.match(/[&?]list=([^&]+)/);
            return match ? match[1] : null;
        }

        async function fetchPlaylistVideos(playlistId) {
            let allVideos = [];
            let continuation = null;
            do {
                if (isCancelled) throw new Error("Cancelled");
                let path = `/api/v1/playlists/${playlistId}?fields=title,videos,continuation`;
                if (continuation) path += `&continuation=${continuation}`;
                const data = await fetchFromInvidious(path);
                if (data.videos) {
                    const videos = data.videos.map(v => ({ id: v.videoId, title: v.title || v.videoId }));
                    allVideos.push(...videos);
                    addLog(`Fetched ${videos.length} videos (total ${allVideos.length})`);
                }
                continuation = data.continuation || null;
                if (continuation) await new Promise(r => setTimeout(r, 500));
            } while (continuation);
            return { videos: allVideos, playlistTitle: "playlist" };
        }

        async function convertVideoToMp3(videoId, title) {
            const payload = {
                url: `https://www.youtube.com/watch?v=${videoId}`,
                aFormat: "mp3",
                isAudioOnly: true,
                isNoTTL: false,
                filenamePattern: "classic"
            };
            const resp = await fetch(COBALT_API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            if (!resp.ok) throw new Error(`Cobalt error ${resp.status}`);
            const data = await resp.json();
            if (data.status === "error") throw new Error(data.text);
            if (!data.url) throw new Error("No download URL");
            const audioResp = await fetch(data.url);
            if (!audioResp.ok) throw new Error("Failed to download MP3");
            const blob = await audioResp.blob();
            let safeTitle = title.replace(/[^\w\s.-]/g, "").slice(0, 60);
            if (!safeTitle) safeTitle = videoId;
            return { blob, filename: `${safeTitle}.mp3` };
        }

        async function startDownload() {
            const url = document.getElementById('playlistUrl').value.trim();
            const playlistId = extractPlaylistId(url);
            if (!playlistId) {
                alert("Invalid playlist URL – must contain ?list=...");
                return;
            }

            isCancelled = false;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('cancelBtn').disabled = false;
            document.getElementById('cancelBtn').classList.remove('cursor-not-allowed', 'bg-gray-600');
            document.getElementById('cancelBtn').classList.add('bg-red-600', 'hover:bg-red-700', 'cursor-pointer');
            document.getElementById('progressArea').classList.remove('hidden');
            document.getElementById('log').innerHTML = '';
            updateProgress(0, "Fetching playlist...");

            try {
                addLog(`Playlist ID: ${playlistId}`);
                const { videos } = await fetchPlaylistVideos(playlistId);
                if (videos.length === 0) throw new Error("No videos found");
                addLog(`✅ Found ${videos.length} videos. Starting MP3 conversion...`);

                const zip = new JSZip();
                let completed = 0;
                const total = videos.length;
                const queue = [...videos];
                const concurrency = 3;
                const errors = [];

                async function worker() {
                    while (queue.length > 0 && !isCancelled) {
                        const video = queue.shift();
                        if (!video) break;
                        try {
                            addLog(`🎧 Converting: ${video.title.substring(0, 50)}...`);
                            const { blob, filename } = await convertVideoToMp3(video.id, video.title);
                            zip.file(filename, blob);
                            completed++;
                            const percent = (completed / total) * 100;
                            updateProgress(percent, `Converted ${completed}/${total}`);
                            addLog(`✅ Added: ${filename}`);
                        } catch (err) {
                            errors.push({ title: video.title, error: err.message });
                            addLog(`❌ Failed: ${video.title.substring(0, 50)} - ${err.message}`, true);
                            completed++;
                            const percent = (completed / total) * 100;
                            updateProgress(percent, `Failed on ${video.title.substring(0, 30)}`);
                        }
                    }
                }

                const workers = [];
                for (let i = 0; i < concurrency; i++) workers.push(worker());
                await Promise.all(workers);

                if (isCancelled) throw new Error("Cancelled by user");

                updateProgress(99, "Creating ZIP...");
                const zipBlob = await zip.generateAsync({ type: "blob" });
                saveAs(zipBlob, `playlist_${playlistId}.zip`);
                addLog(`🎉 Success! ZIP saved with ${zip.file(/\.mp3$/).length} MP3 files. ${errors.length} errors.`);
                updateProgress(100, "Complete!");
            } catch (err) {
                if (err.message !== "Cancelled by user") {
                    addLog(`💥 Fatal error: ${err.message}`, true);
                    updateProgress(0, "Error");
                } else {
                    addLog("⛔ Cancelled.", true);
                }
            } finally {
                document.getElementById('downloadBtn').disabled = false;
                document.getElementById('cancelBtn').disabled = true;
                document.getElementById('cancelBtn').classList.remove('bg-red-600', 'hover:bg-red-700', 'cursor-pointer');
                document.getElementById('cancelBtn').classList.add('bg-gray-600', 'cursor-not-allowed');
                isCancelled = false;
            }
        }

        function cancel() {
            isCancelled = true;
        }

        document.getElementById('downloadBtn').onclick = startDownload;
        document.getElementById('cancelBtn').onclick = cancel;
    </script>
</body>
</html>
